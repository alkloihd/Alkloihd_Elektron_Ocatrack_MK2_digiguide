<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="100%" height="100%" style="background-color: #121212;">
  <defs>
    <style>
      .bg-panel { fill: #484b4d; }
      .bg-edge { fill: #3a3c3e; stroke: #222; stroke-width: 2; }
      .btn-base { fill: #1c1c1c; stroke: #0a0a0a; stroke-width: 2; }
      .btn-top { fill: #292a2c; }
      .btn-func { fill: #9da0a3; stroke: #555; stroke-width: 2; }
      .btn-func-top { fill: #b5b8bc; }
      .lbl-main { font-family: 'Arial', sans-serif; font-size: 11px; fill: #ffffff; font-weight: bold; text-anchor: middle; letter-spacing: 0.5px; }
      .lbl-sub { font-family: 'Arial', sans-serif; font-size: 10px; fill: #a5a7a9; text-anchor: middle; }
      .lbl-red { font-family: 'Arial', sans-serif; font-size: 9px; fill: #a14d4d; text-anchor: middle; }
      .lbl-port { font-family: 'Arial', sans-serif; font-size: 9px; fill: #888; text-anchor: middle; }
      .logo { font-family: 'Impact', 'Arial Black', sans-serif; font-size: 38px; fill: #ffffff; font-style: italic; letter-spacing: 2px; }
      .mk2 { font-family: 'Arial', sans-serif; font-size: 22px; fill: #ffffff; font-weight: bold; }
      .mk2-sub { font-family: 'Arial', sans-serif; font-size: 22px; fill: #888; font-weight: normal; }
      .fader-tick { stroke: #ffffff; stroke-width: 1.5; stroke-linecap: round; }
    </style>

    <g id="encoder">
      <circle cx="25" cy="25" r="25" fill="#151515" stroke="#0a0a0a" stroke-width="2"/>
      <circle cx="25" cy="25" r="20" fill="#222"/>
      <circle cx="25" cy="25" r="16" fill="#1a1a1a"/>
      <rect x="24" y="5" width="2" height="8" fill="#e0e0e0"/>
    </g>

    <g id="btn-rect">
      <rect width="40" height="34" rx="6" class="btn-base"/>
      <rect x="2" y="2" width="36" height="30" rx="4" class="btn-top"/>
    </g>

    <g id="btn-square">
      <rect width="36" height="36" rx="6" class="btn-base"/>
      <rect x="2" y="2" width="32" height="32" rx="4" class="btn-top"/>
