    <g id="led">
      <circle cx="4" cy="4" r="4" fill="#111" stroke="#333" stroke-width="1"/>
      <circle cx="4" cy="4" r="2.5" fill="#333"/>
    </g>
    
    <g id="screw">
      <circle cx="6" cy="6" r="6" fill="#222"/>
      <circle cx="6" cy="6" r="4" fill="#333"/>
      <path d="M 3 6 L 9 6 M 6 3 L 6 9" stroke="#111" stroke-width="1.5"/>
